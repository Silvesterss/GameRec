name: GameRec
options:
  bundleIdPrefix: com.gamerec
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

targets:
  GameRec:
    type: application
    platform: iOS
    sources:
      # Swift 源码（Resources 目录单独作为资源引用，这里排除）
      - path: GameRec
        excludes:
          - "Resources/**"
      # 种子数据按 folder 引用，打包后保留 Data/SeedData 目录结构
      # 与 DataStore 里的 subdirectory: "Data/SeedData" 完全一致
      - path: GameRec/Resources/Data
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gamerec.GameRec
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
